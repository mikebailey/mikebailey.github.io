# Site-wide configuration for Michael Bailey's personal website
# Based on the Academic Pages Jekyll template.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # options: "default", "air", "sunrise", "mint", "dirt", "contrast"
title                    : "Michael Bailey"
title_separator          : "|"
name                     : &name "Michael Bailey"
description              : &description "Mike Bailey (Michael Bailey) is a computational social scientist working at the intersection of AI and social science — founder of the Social Capital Lab."
url                      : https://michaelbailey.org
baseurl                  : ""
repository               : "mikebailey/mikebailey.github.io"

# Site Author - controls what appears in the left sidebar.
author:
  avatar           : "profile.jpg"
  name             : "Michael Bailey"
  pronouns         :
  bio              : "Computational social scientist working at the intersection of AI and social science."
  location         : "Menlo Park, CA"
  employer         : "Founder, Social Capital Lab"
  uri              :
  email            : "mikebailey@alumni.stanford.edu"

  # Academic
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=CF6_E90AAAAJ"
  inspire-hep      :
  impactstory      :
  orcid            : "https://orcid.org/0009-0003-6574-4553"
  semantic         :
  ssrn             : "https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=7501847"
  pubmed           :
  researchgate     :
  scopus           :
  zotero           :

  # Repositories and software
  bitbucket        :
  codepen          :
  dribbble         :
  github           : "mikebailey"
  kaggle           :
  stackoverflow    :

  # Social media
  artstation       :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         : "michael-bailey-a2653521"
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# Publication categories shown on the /publications/ page.
publication_category:
  featured:
    title: 'Selected Publications'
  other:
    title: 'Other Publications'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
atom_feed:
  hide                   : true
  path                   :

# SEO
google_site_verification : "KmlR65vWO32b-cRm0-ILmXNtp3yQiSyjidjGwWKs8iY"
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "profile.jpg"
og_description           : "Mike Bailey (Michael Bailey) is a computational social scientist working at the intersection of AI and social science — founder of the Social Capital Lab."
social:
  type                   : Person
  name                   : "Michael Bailey"
  links:
    - "https://scholar.google.com/citations?user=CF6_E90AAAAJ"
    - "https://www.linkedin.com/in/michael-bailey-a2653521"
    - "https://github.com/mikebailey"
    - "https://orcid.org/0009-0003-6574-4553"
    - "https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=7501847"

# Analytics
analytics:
  provider               :  "false"
  google:
    tracking_id          :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comments: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
